# Render Blueprint. In the Render dashboard: New + > Blueprint > pick this repo.
#
# NOTE: the full ML stack (torch + paddlepaddle + formula OCR) needs
# ~3-4 GB RAM. It will OOM on Free/Starter. `pro` = 4 GB. If you hit limits
# or cost concerns, Hugging Face Spaces (Docker) gives 16 GB RAM free — see
# DEPLOY.md.
services:
  - type: web
    name: docbank-pipeline
    runtime: docker
    plan: pro                 # 4 GB RAM. Smaller plans OOM on model load.
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: LAYOUT_WEIGHTS
        value: /app/doclayout_yolo_docstructbench_imgsz1024.pt
      - key: DATA_ROOT
        value: /tmp/docbank
      - key: OCR_LANG
        value: "korean"        # PaddleOCR recognition language
      # Render injects PORT automatically; the app reads it. No need to set it.
